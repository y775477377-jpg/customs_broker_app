name: customs_broker_app
description: "دليل المخلص الجمركي اليمني - تطبيق مكاتب التخليص (أندرويد/iOS)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # HTTP + إدارة الجلسة
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2

  # إدارة الحالة
  provider: ^6.1.2

  # تنسيق التواريخ والأرقام (دعم عربي)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
